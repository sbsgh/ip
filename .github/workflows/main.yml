name: main
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
concurrency:
  group: main
jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ${{secrets.main}}
      - run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ok.txt
          git commit -m "OK"
          git push origin main
